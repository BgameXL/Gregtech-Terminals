name: Publish (Modrinth + CurseForge)

on:
  release:
    types: [published, prereleased]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Gradle wrapper
        uses: gradle/actions/wrapper-validation@v3

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: zulu
          java-version: 17

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Normalize version
        id: version
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          VERSION="${VERSION#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Apply release version to gradle.properties
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s/^mod_version=.*/mod_version=$VERSION/" gradle.properties

      - name: Build
        run: ./gradlew build

      - name: Publish to Modrinth + CurseForge
        if: ${{ !github.event.release.prerelease }}
        uses: Kir-Antipov/mc-publish@v3.3.0
        with:
          files: |
            build/libs/!(*-@(dev|sources|javadoc)).jar

          name: "Gregtech Terminals ${{ steps.version.outputs.version }}"
          version: ${{ steps.version.outputs.version }}
          changelog: ${{ github.event.release.body }}

          version-type: release
          loaders: forge
          game-versions: |
            1.20.1
          java: 17

          modrinth-id: ${{ secrets.MODRINTH_PROJECT_ID }}
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}

          curseforge-id: ${{ secrets.CURSEFORGE_PROJECT_ID }}
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}

          retry-attempts: 3
          retry-delay: 10000
          fail-mode: warn

      - name: Upload JAR to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: build/libs/!(*-@(dev|sources|javadoc)).jar
          token: ${{ secrets.GITHUB_TOKEN }}